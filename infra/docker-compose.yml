# Monti Jarvis local infra — datastores + NATS + LiveKit + ClickHouse
# Also accepts shared poc-chatgpt-* containers if already running on the same ports.
# Usage: docker compose -f infra/docker-compose.yml up -d

name: monti-jarvis

services:
  postgres:
    image: postgres:16-alpine
    container_name: monti-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - monti-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: monti-redis
    ports:
      - "6379:6379"
    volumes:
      - monti-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: monti-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - monti-minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    container_name: monti-nats
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  livekit:
    image: livekit/livekit-server:latest
    container_name: monti-livekit
    command: ["--dev", "--bind", "0.0.0.0"]
    environment:
      LIVEKIT_KEYS: "devkey: secret"
    ports:
      - "7880:7880"
      - "7881:7881/udp"
      - "7882:7882/udp"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7880"]
      interval: 5s
      timeout: 3s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: monti-clickhouse
    environment:
      CLICKHOUSE_DB: monti_jarvis
      CLICKHOUSE_USER: monti
      CLICKHOUSE_PASSWORD: monti
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  monti-pg:
  monti-redis:
  monti-minio:
